services:
  web:
    build:
      context: .
      args:
        NODE_VERSION: 22-alpine
    image: iglesiavh11-org:latest
    container_name: iglesiavh11
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Base de datos SQLite dentro del volumen persistente
      DATABASE_URL: "file:./data/hebreos11.db"
    volumes:
      # Persiste la base de datos entre reinicios/despliegues
      - hebreos11-db:/app/prisma/data

volumes:
  hebreos11-db:
